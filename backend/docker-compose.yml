version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: enasverse
      POSTGRES_PASSWORD: enasverse
      POSTGRES_DB: enasverse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
